<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นาย ชาเย็น - Login</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            padding-top: 30px;
            padding-left: 10%;
        }

        .bg-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 30%, #0a1628 60%, #0a0a1a 100%);
        }
        .bg-container::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0,212,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(168,85,247,0.08) 0%, transparent 50%);
        }
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%);
        }

        .container {
            position: relative; z-index: 10;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            padding-top: 0%;
        }

        .logo h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .logo .subtitle {
            font-size: 0.9em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
            font-weight: 400;
        }

        .auth-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0,212,255,0.2);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #8fa3c7;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #8fa3c7;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0,212,255,0.2);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8fa3c7;
            font-size: 1.1em;
        }

        .toggle-password:hover {
            color: #00d4ff;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-row input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-row label {
            color: #8fa3c7;
            font-size: 0.85em;
            cursor: pointer;
            margin: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #a855f7 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }

        .error-msg {
            color: #ff6b7a;
            font-size: 0.85em;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .success-msg {
            color: #2ecc71;
            font-size: 0.85em;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="bg-overlay"></div>
    </div>

    <div class="container">
        <div class="logo">
            <h1>MONEY</h1>
            <div class="subtitle">ระบบยืมเงินออนไลน์ สะดวก รวดเร็ว ปลอดภัย</div>
        </div>

        <div class="auth-box">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">เข้าสู่ระบบ</div>
                <!-- สมัครสมาชิกปิดไว้ สมัครผ่านแอดมินเท่านั้น -->
            </div>

            <!-- Login Form -->
            <div class="form-container active" id="loginForm">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="loginUsername" placeholder="กรุณากรอกชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="กรุณากรอกรหัสผ่าน">
                        <span class="toggle-password" onclick="togglePassword('loginPassword', this)">👁</span>
                    </div>
                </div>
                <div class="remember-row">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">จดจำรหัสผ่าน</label>
                </div>
                <button class="btn btn-primary" onclick="login()">เข้าสู่ระบบ</button>
                <div class="error-msg" id="loginError"></div>
            </div>

            <!-- Register Form ปิดการใช้งาน -->
            <div class="form-container" id="registerForm" style="display:none;">
                <p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">
                    ระบบสมัครสมาชิกปิดชั่วคราว<br>
                    กรุณาติดต่อแอดมินเพื่อสมัคร
                </p>
            </div>
        </div>
    </div>

    <script>
        // โหลดข้อมูลจดจำ
        const savedUsername = localStorage.getItem('rememberUsername');
        const savedPassword = localStorage.getItem('rememberPassword');
        if (savedUsername && savedPassword) {
            document.getElementById('loginUsername').value = savedUsername;
            document.getElementById('loginPassword').value = savedPassword;
            document.getElementById('rememberMe').checked = true;
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            
            if (!username || !password) {
                errorEl.textContent = 'กรุณากรอกข้อมูลให้ครบ';
                errorEl.style.display = 'block';
                return;
            }

            // จดจำรหัส
            if (remember) {
                localStorage.setItem('rememberUsername', username);
                localStorage.setItem('rememberPassword', password);
            } else {
                localStorage.removeItem('rememberUsername');
                localStorage.removeItem('rememberPassword');
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    sessionStorage.setItem('username', data.user.username);
                    sessionStorage.setItem('role', data.user.role);
                    
                    // Redirect based on role
                    if (data.user.role === 'admin' || data.user.role === 'dev') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorEl.textContent = data.message;
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = 'เกิดข้อผิดพลาด';
                errorEl.style.display = 'block';
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const phone = document.getElementById('regPhone').value;
            const wallet = document.getElementById('regWallet').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorEl = document.getElementById('regError');
            const successEl = document.getElementById('regSuccess');
            
            if (!username || !phone || !wallet || !password || !confirmPassword) {
                errorEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            // Validate phone number
            if (!/^0\d{9}$/.test(phone)) {
                errorEl.textContent = 'เบอร์โทรไม่ถูกต้อง (ต้องขึ้นต้นด้วย 0 และมี 10 หลัก)';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            if (!/^0\d{9}$/.test(wallet)) {
                errorEl.textContent = 'เบอร์วอเลทไม่ถูกต้อง (ต้องขึ้นต้นด้วย 0 และมี 10 หลัก)';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            if (password !== confirmPassword) {
                errorEl.textContent = 'รหัสผ่านไม่ตรงกัน';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, phone, wallet })
                });
                const data = await res.json();
                
                if (data.success) {
                    errorEl.style.display = 'none';
                    successEl.textContent = data.message;
                    successEl.style.display = 'block';
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    errorEl.textContent = data.message;
                    errorEl.style.display = 'block';
                    successEl.style.display = 'none';
                }
            } catch (e) {
                errorEl.textContent = 'เกิดข้อผิดพลาด';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            }
        }
    </script>
</body>
</html>
